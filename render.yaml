services:
  - type: web
    name: cmo-agent
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: EXA_API_KEY
        sync: false
      - key: COMPOSIO_API_KEY
        sync: false
      - key: SYNAP_API_KEY
        sync: false
      - key: PIONEER_API_KEY
        sync: false
      - key: PIONEER_BASE_URL
        value: https://api.pioneer.ai
      - key: OPENUI_URL
        sync: false
      - key: OPENUI_MODEL
        value: gpt-4o
      - key: BROWSERBASE_API_KEY
        sync: false
      - key: BROWSERBASE_PROJECT_ID
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      # Frontend (Vite) build-time vars — baked into the bundle via the Dockerfile ARG block.
      # Only the web service builds the frontend, so these live here (not on the worker). Without
      # VITE_SUPABASE_*, the prod frontend silently runs unauthenticated (demo mode).
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_SENTRY_DSN
        sync: false
      - key: VITE_POSTHOG_KEY
        sync: false
      - key: VITE_POSTHOG_HOST
        sync: false
      # Provision a Render Key Value (Redis) instance or Upstash, then set REDIS_URL on BOTH
      # this web service and the worker below. Leave unset to use the in-process scheduler.
      - key: REDIS_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      # Product analytics (PostHog), server-side. The VITE_POSTHOG_* keys for the frontend are
      # baked at build time — set those in the Render dashboard like VITE_SUPABASE_*.
      - key: POSTHOG_API_KEY
        sync: false
      - key: POSTHOG_HOST
        sync: false

  # Background worker: runs scheduled monitors off the web process (see backend/app/worker.py).
  # Only does anything once REDIS_URL is set; deploy it alongside a Redis/Key-Value instance.
  - type: worker
    name: cmo-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    dockerCommand: arq app.worker.WorkerSettings
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: EXA_API_KEY
        sync: false
      - key: COMPOSIO_API_KEY
        sync: false
      - key: SYNAP_API_KEY
        sync: false
      - key: PIONEER_API_KEY
        sync: false
      - key: PIONEER_BASE_URL
        value: https://api.pioneer.ai
      - key: BROWSERBASE_API_KEY
        sync: false
      - key: BROWSERBASE_PROJECT_ID
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      # Product analytics (PostHog) — the worker emits monitor/feeder events too.
      - key: POSTHOG_API_KEY
        sync: false
      - key: POSTHOG_HOST
        sync: false
