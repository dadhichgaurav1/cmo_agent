services:
  - type: web
    name: cmo-agent
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: EXA_API_KEY
        sync: false
      - key: COMPOSIO_API_KEY
        sync: false
      - key: SYNAP_API_KEY
        sync: false
      - key: PIONEER_API_KEY
        sync: false
      - key: PIONEER_BASE_URL
        value: https://api.pioneer.ai
      - key: OPENUI_URL
        sync: false
      - key: OPENUI_MODEL
        value: gpt-4o
      - key: BROWSERBASE_API_KEY
        sync: false
      - key: BROWSERBASE_PROJECT_ID
        sync: false
